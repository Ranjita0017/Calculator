<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Welcome to Calculate me!</h1>
    <div class="container">
        <input class="display">
        <div class="rows">
             <!-- <div class="row-1"> -->
                <button class="seven" >7</button>
                <button class="eight" >8</button>
                <button class="nine" >9</button>
                <button class="plus">+</button>
             <!-- </div> -->
            <!-- <div class="row-2"> -->
                <button class="four">4</button>
                <button class="five">5</button>
                <button class="six" >6</button>
                <button class="minus" >-</button>
            <!-- </div> -->
            <!-- <div class="row-3"> -->
                <button class="one" type="button">1</button>
                <button class="two" type="button">2</button>
                <button class="three" type="button">3</button>
                <button class="multiply" type="button">*</button>
            <!-- </div> -->
            <!-- <div class="row-4"> -->
                <button class="cancel" type="button">CE</button>
                <button class="zero" type="button">0</button>
                <button class="divide" type="button">/</button>
                <button class="equal-to" type="button">=</button>
            <!-- </div> -->
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
